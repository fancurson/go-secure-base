name: Secure-Go-Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'  
          cache: true

      - name: Install dependencies
        run: go mod tidy

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

  ai-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Context and Diff
        id: prep
        run: |
          # Собираем структуру проекта (для контекста)
          STRUCT=$(find . -maxdepth 3 -not -path '*/.*' -not -path './vendor*' \( -type d -o -name "*.go" \) | sed 's/^\.\///')
          echo "PROJECT_STRUCTURE<<EOF" >> $GITHUB_OUTPUT
          echo "$STRUCT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Получаем дифф между ветками
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          
          if [ ! -s pr_diff.txt ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Gemini AI Review
        if: steps.prep.outputs.skip == 'false'
        id: gemini
        run: |
          # Формируем тело промпта
          DIFF_CONTENT=$(cat pr_diff.txt)
          STRUCT_CONTENT="${{ steps.prep.outputs.PROJECT_STRUCTURE }}"
          
          PROMPT="Ты Senior Go Developer. Сделай краткое ревью кода на русском. 
          Структура проекта:
          $STRUCT_CONTENT
          
          Изменения (diff):
          $DIFF_CONTENT"

          # Безопасно упаковываем в JSON
          cat <<EOF > request.json
          {
            "contents": [{
              "parts":[{"text": $(echo "$PROMPT" | jq -aRs .)}]
            }]
          }
          EOF

          # Отправляем запрос напрямую в Google
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H 'Content-Type: application/json' \
            -d @request.json)

          # Вытаскиваем текст ответа
          REVIEW_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Ошибка: API не вернул текст ревью."')
          
          # Сохраняем результат для следующего шага
          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW_TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        if: steps.prep.outputs.skip == 'false'
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ### 🤖 AI Code Review (Gemini 2.0 Flash)
            ${{ steps.gemini.outputs.text }}