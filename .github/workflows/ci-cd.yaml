name: Secure-Go-Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize]

jobs:
  # Ваша текущая работа по безопасности
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: go mod tidy

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

  ai-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Gemini AI Review
        uses: coderabbitai/ai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Передаем всё через ENV, чтобы экшен не ругался на "unexpected input"
          OPENAI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_HOST: generativelanguage.googleapis.com
          # Важно: тут прописываем полный путь для OpenAI-совместимости
          OPENAI_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
        with:
          debug: true # Оставь пока true, чтобы видеть детали в логах, если упадет
          # В самом with оставляем только общие настройки, без модели и урла
          summarize: true
          system_message: |
            Ты Senior Go Developer. 
            Делай ревью на русском языке. 
            Уделяй внимание обработке ошибок, конкурентности и идиоматичности Go.