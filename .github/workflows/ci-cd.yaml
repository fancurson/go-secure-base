name: Secure-Go-Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'  
          cache: true

      - name: Install dependencies
        run: go mod tidy

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

  ai-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Важно: fetch-depth 0 нужен, чтобы сравнить ветки. 
          # Иначе git diff не увидит разницы с main.
          fetch-depth: 0

      - name: Prepare Context and Diff
        id: prep
        run: |
          # 1. Генерируем структуру проекта (только папки и .go файлы)
          echo "PROJECT_STRUCTURE<<EOF" >> $GITHUB_OUTPUT
          find . -maxdepth 3 -not -path '*/.*' -not -path './vendor*' \( -type d -o -name "*.go" \) | sed 's/^\.\///' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # 2. Получаем дифф между текущей веткой и целевой веткой PR (обычно main)
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          
          # 3. Проверяем, не пустой ли файл (на случай странных PR)
          if [ ! -s pr_diff.txt ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Gemini AI Review
        if: steps.prep.outputs.skip == 'false'
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0.2.0
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          model: 'gemini-2.0-flash'
          # Простой базовый промпт, как ты и просил
          prompt: |
            Ты Senior Go Developer. Сделай краткое ревью кода на русском.
            
            СТРУКТУРА ПРОЕКТА:
            ${{ steps.prep.outputs.PROJECT_STRUCTURE }}
            
            ИЗМЕНЕНИЯ (DIFF):
            $(cat pr_diff.txt)

      - name: Post Review Comment
        if: steps.prep.outputs.skip == 'false' && steps.gemini.outputs.text != ''
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ### 🤖 AI Code Review
            ${{ steps.gemini.outputs.text }}