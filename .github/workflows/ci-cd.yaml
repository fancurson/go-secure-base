name: Secure-Go-Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Нужно для публикации отчетов во вкладку Security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true # Включаем встроенный кэш для зависимостей Go

      # 1. SCA - Используем официальный action (быстрее и надежнее)
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.22'

      # 2. SAST - Используем официальный action с генерацией отчета
      - name: Run gosec
        uses: securego/gosec@master
        with:
          # Генерируем отчет и исключаем тесты
          args: '-no-fail -fmt sarif -out results.sarif ./...'

      # 3. Публикация результатов в GitHub Security Tab
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        if: always() # Загружаем отчет, даже если найдены уязвимости