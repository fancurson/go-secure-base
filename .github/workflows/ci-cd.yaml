name: Secure-Go-Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Критически важно для приватных репо и вкладки Security
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # SCA: Проверка зависимостей
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.22'

      # SAST: Статический анализ кода
      - name: Run gosec
        uses: securego/gosec@master
        with:
          # Генерируем отчет, чтобы он появился в Security Tab
          args: '-fmt sarif -out results.sarif ./...'

      # Загрузка результатов (теперь с правами доступа)
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        if: always()